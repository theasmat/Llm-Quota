name: Docs

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Install Typedoc
        run: npm install -D typedoc

      - name: Build TypeScript Docs
        run: npx typedoc --out docs/frontend src/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Rust Docs
        run: |
          cd src-tauri
          cargo doc --no-deps
          cp -r target/doc ../docs/backend

      - name: Create index.html
        run: |
          cat << 'EOF' > docs/index.html
          <!DOCTYPE html>
          <html>
          <head><title>Llm Quota Documentation</title></head>
          <body style="font-family: sans-serif; padding: 2rem;">
            <h1>Llm Quota Internal Documentation</h1>
            <ul>
              <li><a href="frontend/index.html">Frontend Docs (TypeScript)</a></li>
              <li><a href="backend/llm_quota/index.html">Backend Docs (Rust)</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
